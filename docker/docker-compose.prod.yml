# =============================================================================
# IMPORTANT: provide all .env.production secrets before starting.
# Copy .env.production.example → .env.production and fill every value.
#
# Start:   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d
# Stop:    docker compose -f docker/docker-compose.prod.yml down
# Logs:    docker compose -f docker/docker-compose.prod.yml logs -f app
# =============================================================================

services:
  db:
    image: postgres:16.3-alpine
    restart: always
    environment:
      POSTGRES_DB: cerro
      POSTGRES_USER: cerro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerro"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://cerro:${POSTGRES_PASSWORD}@db:5432/cerro
      SESSION_SECRET: ${SESSION_SECRET}
      QR_SECRET: ${QR_SECRET}
      DEVICE_PIN_SECRET: ${DEVICE_PIN_SECRET}
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"  # TLS config goes here (certbot/Let's Encrypt — see docs/TLS.md)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backup:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: cerro
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh"]
    restart: unless-stopped

volumes:
  db_data:
