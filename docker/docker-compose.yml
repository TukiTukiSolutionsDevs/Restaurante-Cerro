services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cerro
      POSTGRES_USER: cerro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerro"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://cerro:${POSTGRES_PASSWORD}@db:5432/cerro
      SESSION_SECRET: ${SESSION_SECRET}
      QR_SECRET: ${QR_SECRET}
      DEVICE_PIN_SECRET: ${DEVICE_PIN_SECRET}
      NODE_ENV: production
      UPLOADS_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
